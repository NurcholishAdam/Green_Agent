apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: green-agent-production

bases:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

configMapGenerator:
  - name: green-agent-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - RAY_WORKERS=8
      - LOG_LEVEL=INFO

replicas:
  - name: green-agent
    count: 3
