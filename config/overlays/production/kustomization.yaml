apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: green-agent-production
namePrefix: prod-

resources:
- ../../base

commonLabels:
  environment: production
  criticality: high

configMapGenerator:
- name: green-agent-config
  behavior: merge
  literals:
  - LOG_LEVEL=WARNING
  - RAY_ENABLED=true
  - QUANTUM_ENABLED=true
  - CARBON_API_PROVIDER=electricitymap

images:
- name: ghcr.io/nurcholishadam/green_agent
  newTag: v5.0.0

replicas:
- name: green-agent-cluster
  count: 8

patches:
- target:
    kind: RayCluster
    name: green-agent-cluster
  patch: |-
    - op: replace
      path: /spec/headGroupSpec/template/spec/securityContext
      value:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
