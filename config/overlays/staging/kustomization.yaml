apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: green-agent-staging

bases:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

configMapGenerator:
  - name: green-agent-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
      - RAY_WORKERS=4
      - LOG_LEVEL=INFO

replicas:
  - name: green-agent
    count: 2
