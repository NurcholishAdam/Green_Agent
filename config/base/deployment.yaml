apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-agent
  namespace: green-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: green-agent
  template:
    metadata:
      labels:
        app: green-agent
    spec:
      containers:
      - name: green-agent
        image: green-agent:latest
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 8265
          name: ray-dashboard
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
