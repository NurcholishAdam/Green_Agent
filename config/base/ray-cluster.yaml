apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: green-agent-cluster
  labels:
    app: green-agent
spec:
  rayVersion: '2.7.0'
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      num-cpus: '2'
    template:
      metadata:
        labels:
          app: green-agent
          component: head
      spec:
      containers:
      - name: ray-head
      image: green-agent:v5.0.0  # ✅ Base name (kustomize will override tag)
      imagePullPolicy: IfNotPresent
  # ... rest of config
          ports:
          - containerPort: 8000
          - containerPort: 8265
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 2
    groupName: workers
    rayStartParams:
      num-cpus: '2'
    template:
      metadata:
        labels:
          app: green-agent
          component: worker
      spec:
        containers:
        - name: ray-worker
          image: green-agent:test
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
