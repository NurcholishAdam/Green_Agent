apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: green-agent-cluster
  labels:
    app: green-agent
spec:
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      num-cpus: '4'
    template:
      metadata:
        labels:
          app: green-agent
          component: head
      spec:
        containers:
        - name: ray-head
          image: ghcr.io/nurcholishadam/green_agent:v5.0.0
          imagePullPolicy: IfNotPresent  # ✅ CRITICAL: Use local image in Kind
          ports:
          - containerPort: 6379
          - containerPort: 8265
          - containerPort: 8000
          - containerPort: 9090
          resources:
            requests:
              cpu: "500m"    # ✅ Reduced for CI
              memory: "1Gi"  # ✅ Reduced for CI
            limits:
              cpu: "2"
              memory: "4Gi"
          
          # ✅ Health probes in CORRECT location (container spec)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60    # ✅ Relaxed for slow CI startup
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
            successThreshold: 1
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30    # ✅ Relaxed for CI
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          
          startupProbe:  # ✅ Added: Allows slow startup in CI
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30  # Allow up to 5 minutes for startup
          
          volumeMounts:
          - name: config-volume
            mountPath: /app/config
          - name: data-volume
            mountPath: /app/data
            readOnly: false
        
        volumes:
        - name: config-volume
          configMap:
            name: green-agent-config
        - name: data-volume
          emptyDir: {}  # ✅ Use emptyDir for CI (no PVC needed)
  
  workerGroupSpecs:
  - replicas: 2
    minReplicas: 1
    maxReplicas: 4
    groupName: standard-workers
    rayStartParams:
      num-cpus: '2'
    template:
      metadata:
        labels:
          app: green-agent
          component: worker
      spec:
        containers:
        - name: ray-worker
          image: ghcr.io/nurcholishadam/green_agent:v5.0.0
          imagePullPolicy: IfNotPresent  # ✅ Use local image
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
          - name: config-volume
            mountPath: /app/config
        volumes:
        - name: config-volume
          configMap:
            name: green-agent-config
