# config/base/ray-cluster.yaml
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: green-agent-cluster
  labels:
    app: green-agent
spec:
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      num-cpus: '4'
    template:
      metadata:
        labels:
          app: green-agent
          component: head
      spec:
        containers:
        - name: ray-head
          image: ghcr.io/nurcholishadam/green_agent:v5.0.0
          imagePullPolicy: IfNotPresent  # ✅ Use local image in Kind
          ports:
          - containerPort: 6379
          - containerPort: 8265
          - containerPort: 8000
          - containerPort: 9090
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          
          # ✅ Health probes MUST be in container spec (not ConfigMap)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60    # ✅ Relaxed for CI
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30    # ✅ Relaxed for CI
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          
          volumeMounts:
          - name: config-volume
            mountPath: /app/config
          - name: data-volume
            mountPath: /app/data
        
        volumes:
        - name: config-volume
          configMap:
            name: green-agent-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: green-agent-data-pvc
  
  workerGroupSpecs:
  - replicas: 4
    minReplicas: 2
    maxReplicas: 20
    groupName: standard-workers
    rayStartParams:
      num-cpus: '2'
    template:
      metadata:
        labels:
          app: green-agent
          component: worker
      spec:
        containers:
        - name: ray-worker
          image: ghcr.io/nurcholishadam/green_agent:v5.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
          - name: config-volume
            mountPath: /app/config
        volumes:
        - name: config-volume
          configMap:
            name: green-agent-config
