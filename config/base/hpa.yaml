apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: green-agent-hpa
  labels:
    app: green-agent
spec:
  scaleTargetRef:
    apiVersion: ray.io/v1
    kind: RayCluster
    name: green-agent-cluster
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
