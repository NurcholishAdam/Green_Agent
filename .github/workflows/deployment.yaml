apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-agent
  namespace: green-agent
  labels:
    app: green-agent
    component: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: green-agent
      component: core
  template:
    metadata:
      labels:
        app: green-agent
        component: core
    spec:
      containers:
      - name: green-agent
        image: green-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
          protocol: TCP
        - containerPort: 8265
          name: ray-dashboard
          protocol: TCP
        env:
        - name: VERSION
          valueFrom:
            configMapKeyRef:
              name: green-agent-config
              key: VERSION
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: green-agent-config
              key: ENVIRONMENT
        - name: RAY_WORKERS
          valueFrom:
            configMapKeyRef:
              name: green-agent-config
              key: RAY_WORKERS
        - name: CARBON_REGION
          valueFrom:
            configMapKeyRef:
              name: green-agent-config
              key: CARBON_REGION
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
