name: Build & Publish GreenAgent to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/nurcholishadam/green_agent:main

      - name: Test connectivity to ghcr.io
      run: |
        echo "Testing DNS resolution..."
        python3 -c "import socket; print(socket.gethostbyname('ghcr.io'))" || echo "DNS resolution FAILED"
        echo "Testing TCP connection to port 443..."
        python3 -c "
        import socket
    try:
        sock = socket.create_connection(('ghcr.io', 443), timeout=10)
        print('TCP connection SUCCESS')
        sock.close()
    except Exception as e:
        print(f'TCP connection FAILED: {e}')
    "

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      env:
      HTTP_PROXY: ${{ secrets.HTTP_PROXY_URL }}
      HTTPS_PROXY: ${{ secrets.HTTPS_PROXY_URL }}
      with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}
