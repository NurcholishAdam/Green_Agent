name: Build and Export Docker Image

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Build the Docker image (no push required)
      - name: Build Docker image
        run: |
          docker build -t green-agent:latest .

      # Step 2: Save the image as a .tar file
      - name: Save Docker image
        run: |
          docker save green-agent:latest -o /tmp/green-agent.tar

      # Step 3: Upload the .tar file as a workflow artifact
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: green-agent-docker-image
          path: /tmp/green-agent.tar
