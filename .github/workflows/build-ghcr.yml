name: Build and Export Docker Image (No Registry Push)

on:
  push:
    branches: [main]

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t green-agent:latest .

      - name: Save Docker image to tar file
        run: |
          docker save green-agent:latest -o /tmp/green-agent.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: green-agent-docker-image
          path: /tmp/green-agent.tar
