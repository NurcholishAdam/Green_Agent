name: Build and Push Docker Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write  # Required to push to GitHub Container Registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Log in to ghcr.io with the automatic GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Build the image and tag it correctly
      - name: Build Docker image
        run: |
          # Build the image with the 'main' tag (matching the current branch)
          docker build -t ghcr.io/${{ github.repository }}:main .
          # Also tag it as 'latest' so you can push both
          docker tag ghcr.io/${{ github.repository }}:main ghcr.io/${{ github.repository }}:latest

      # Step 3: Push the tagged images
      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository }}:main
          docker push ghcr.io/${{ github.repository }}:latest
