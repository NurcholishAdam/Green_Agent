apiVersion: v1
kind: ConfigMap
metadata:
  name: green-agent-config
  namespace: green-agent
  labels:
    app: green-agent
data:
  VERSION: "5.0.0"
  ENVIRONMENT: "base"
  RAY_WORKERS: "4"
  CARBON_REGION: "US-CA"
  config.yaml: |
    # Green Agent Configuration
    system:
      version: "5.0.0"
      mode: "unified"
    
    ray:
      num_workers: 4
      dashboard_port: 8265
      object_store_memory: 10737418240
    
    carbon:
      default_region: "US-CA"
      forecast_days: 30
      update_interval_hours: 1
    
    policy:
      mode: "moderate"
      enforce_lora_above_1b_params: true
      block_if_budget_exceeded: true
    
    optimization:
      enable_data_compression: true
      target_compression_ratio: 0.3
      enable_synthetic_generation: true
      synthetic_ratio: 0.2
