name: Deploy Green Agent

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # ✅ Use official Kubernetes action with direct credentials
    - name: Deploy to Kubernetes
      uses: azure/k8s-deploy@v5
      with:
        # ✅ FIX: Use cluster context directly instead of kubeconfig secret
        kubeconfig: ${{ secrets.KUBE_CONFIG }}
        namespace: green-agent-${{ github.event.inputs.environment || 'staging' }}
        # Deploy using kustomize
        manifests: |
          config/overlays/${{ github.event.inputs.environment || 'staging' }}/kustomization.yaml
        images: |
          ghcr.io/nurcholishadam/green_agent:${{ github.sha }}
        strategy: rolling
        force: false
    
    - name: Verify deployment
      run: |
        NAMESPACE="green-agent-${{ github.event.inputs.environment || 'staging' }}"
        
        # Wait for pods
        kubectl wait --for=condition=ready pod \
          -l app=green-agent \
          -n $NAMESPACE \
          --timeout=300s || true
        
        # Show status
        kubectl get all -n $NAMESPACE
