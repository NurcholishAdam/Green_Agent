name: Deploy Green Agent

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

env:
  KUBECONFIG_PATH: ${{ github.workspace }}/kubeconfig

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.0'
    
    - name: Configure Kubernetes credentials
      run: |
        echo "🔐 Setting up Kubernetes credentials..."
        KUBECONFIG_FILE="${{ env.KUBECONFIG_PATH }}"
        
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$KUBECONFIG_FILE"
        chmod 600 "$KUBECONFIG_FILE"
        
        echo "KUBECONFIG=${KUBECONFIG_FILE}" >> $GITHUB_ENV
        export KUBECONFIG="${KUBECONFIG_FILE}"
        
        if [ ! -s "$KUBECONFIG_FILE" ]; then
          echo "❌ Kubeconfig file is empty"
          exit 1
        fi
        
        if ! grep -q "clusters:" "$KUBECONFIG_FILE"; then
          echo "❌ Kubeconfig missing required fields"
          exit 1
        fi
        
        echo "🔍 Testing cluster connection..."
        if kubectl --kubeconfig="${KUBECONFIG_FILE}" cluster-info --request-timeout=30s; then
          echo "✅ Connected to cluster!"
          kubectl --kubeconfig="${KUBECONFIG_FILE}" get nodes --request-timeout=30s || true
        else
          echo "❌ Failed to connect to cluster"
          exit 1
        fi
      shell: bash
    
    - name: Verify config files exist
      run: |
        echo "🔍 Verifying config structure..."
        REQUIRED_FILES=(
          "config/base/kustomization.yaml"
          "config/overlays/${{ github.event.inputs.environment || 'staging' }}/kustomization.yaml"
        )
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing: $file"
            exit 1
          fi
          echo "  ✅ $file"
        done
        echo "✅ All config files present"
      shell: bash
    
    - name: Deploy to Kubernetes
      run: |
        ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"
        NAMESPACE="green-agent-${ENVIRONMENT}"
        CONFIG_DIR="config/overlays/${ENVIRONMENT}"
        PREFIX="${ENVIRONMENT:0:4}"
        KUBECONFIG_FILE="${{ env.KUBECONFIG_PATH }}"
        
        echo "🚀 Deploying to $ENVIRONMENT..."
        
        kubectl --kubeconfig="${KUBECONFIG_FILE}" create namespace "$NAMESPACE" --dry-run=client -o yaml | \
          kubectl --kubeconfig="${KUBECONFIG_FILE}" apply -f -
        
        kubectl --kubeconfig="${KUBECONFIG_FILE}" apply -k "$CONFIG_DIR" -n "$NAMESPACE" --server-side --force-conflicts
        
        echo "⏳ Waiting for deployment..."
        kubectl --kubeconfig="${KUBECONFIG_FILE}" wait --for=condition=available \
          deployment/"${PREFIX}green-agent-cluster-head" \
          -n "$NAMESPACE" \
          --timeout=300s || true
        
        echo "📊 Deployment Status:"
        kubectl --kubeconfig="${KUBECONFIG_FILE}" get all -n "$NAMESPACE" -o wide || true
        
        kubectl --kubeconfig="${KUBECONFIG_FILE}" get all -n "$NAMESPACE" -o yaml > /tmp/deployment-status.yaml 2>&1 || true
        
        echo "✅ Deployment complete!"
      shell: bash
      env:
        KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
    
    - name: Upload Deployment Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: deployment-logs-${{ github.event.inputs.environment || 'staging' }}
        path: |
          /tmp/deployment-status.yaml
        retention-days: 7
        if-no-files-found: warn
    
    - name: Notify Success
      if: success()
      run: |
        echo "✅ Deployment to ${{ github.event.inputs.environment || 'staging' }} successful!"
    
    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        KUBECONFIG_FILE="${{ env.KUBECONFIG_PATH }}"
        if [ -f "$KUBECONFIG_FILE" ]; then
          kubectl --kubeconfig="${KUBECONFIG_FILE}" cluster-info 2>&1 || true
        fi
        exit 1
      shell: bash
      env:
        KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
