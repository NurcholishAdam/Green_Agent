# Add this job BEFORE the main deploy job
  test-kind:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'  # Only run on PRs
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind create cluster --name green-agent-test
        
        # Install metrics-server for HPA
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        kubectl patch deployment metrics-server -n kube-system \
          --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
    
    - name: Test kustomize builds
      run: |
        for env in development staging production; do
          echo "▶ Testing $env kustomize build..."
          kubectl kustomize "config/overlays/$env" --enable-helm > /dev/null
          echo "✅ $env builds successfully"
        done
    
    - name: Deploy to Kind (development overlay)
      run: |
        kubectl create namespace green-agent-test
        kubectl apply -k config/overlays/development -n green-agent-test
        
        # Wait for pods
        kubectl wait --for=condition=ready pod \
          -l app=green-agent \
          -n green-agent-test \
          --timeout=300s || true
        
        # Verify
        kubectl get all -n green-agent-test
    
    - name: Cleanup
      if: always()
      run: |
        kind delete cluster --name green-agent-test || true
