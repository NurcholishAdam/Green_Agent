name: Verify Deployment Setup

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Check file structure
      run: |
        echo "📋 Checking required files..."
        
        for env in development staging production; do
          echo "▶ Checking $env..."
          if [ -f "config/overlays/$env/kustomization.yaml" ]; then
            echo "  ✅ kustomization.yaml exists"
          else
            echo "  ❌ kustomization.yaml MISSING"
            exit 1
          fi
        done
        
        echo "✅ All kustomization files present"
    
    - name: Test kustomize
      run: |
        echo "🔍 Testing kustomize builds..."
        
        for env in development staging production; do
          echo "▶ Building $env..."
          if kubectl kustomize "config/overlays/$env" --enable-helm > /dev/null 2>&1; then
            echo "  ✅ $env builds successfully"
          else
            echo "  ❌ $env build FAILED"
            kubectl kustomize "config/overlays/$env" --enable-helm 2>&1 | head -20
            exit 1
          fi
        done
        
        echo "✅ All kustomize builds successful"
    
    - name: Verify workflow syntax
      run: |
        echo "🔍 Checking workflow syntax..."
        if command -v actionlint &> /dev/null; then
          actionlint .github/workflows/deploy.yml
        else
          echo "⚠ actionlint not installed, skipping"
        fi
        echo "✅ Workflow syntax OK"
    
    - name: Summary
      run: |
        echo ""
        echo "✅ Verification complete!"
        echo ""
        echo "🚀 Ready to deploy:"
        echo "1. Ensure GitHub secrets are set: KUBE_CONFIG, CARBON_API_KEY, etc."
        echo "2. Trigger deployment: Actions → Deploy Green Agent → Run workflow"
        echo "3. Select environment: development/staging/production"
        echo ""
        echo "📊 Monitor: GitHub Actions → Deploy Green Agent → View logs"
