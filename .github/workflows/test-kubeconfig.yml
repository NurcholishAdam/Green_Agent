name: Test Kubernetes Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.0'
    
    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        export KUBECONFIG=~/.kube/config
        
        echo "🔍 Testing connection..."
        echo "KUBECONFIG: $KUBECONFIG"
        echo ""
        
        echo "Config file (sanitized):"
        grep -v "token:\|password:\|client-key-data:\|certificate-authority-data:" ~/.kube/config || true
        echo ""
        
        echo "Cluster info:"
        kubectl cluster-info --request-timeout=30s || echo "❌ Failed"
        echo ""
        
        echo "Nodes:"
        kubectl get nodes --request-timeout=30s || echo "❌ Failed"
        echo ""
        
        echo "Namespaces:"
        kubectl get namespaces --request-timeout=30s || echo "❌ Failed"
