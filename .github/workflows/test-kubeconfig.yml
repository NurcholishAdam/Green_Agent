# .github/workflows/test-kubeconfig.yml
name: Test Kubeconfig Secret

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Decode and verify
      run: |
        echo "🔍 Testing KUBE_CONFIG secret..."
        
        # Decode
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/test-kubeconfig
        
        # Verify structure
        echo "📋 File size: $(stat -c%s /tmp/test-kubeconfig) bytes"
        echo "📋 First 5 lines:"
        head -5 /tmp/test-kubeconfig
        
        # Check required fields
        if grep -q "clusters:" /tmp/test-kubeconfig && \
           grep -q "users:" /tmp/test-kubeconfig && \
           grep -q "server:" /tmp/test-kubeconfig; then
          echo "✅ Kubeconfig has required fields"
        else
          echo "❌ Missing required fields"
          exit 1
        fi
        
        echo "✅ Secret is valid!"
