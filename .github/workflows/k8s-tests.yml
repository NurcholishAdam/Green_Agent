# Replace the "Deploy Green Agent to Kind" step with this:

- name: Deploy Green Agent to Kind
  run: |
    echo "🚀 Deploying Green Agent to test namespace..."
    
    # Create namespace (ignore annotation warning)
    kubectl create namespace ${{ env.TEST_NAMESPACE }} 2>/dev/null || true
    
    # ✅ FIX 1: Use client-side apply (no --server-side) for kustomize
    # Server-side apply has issues with mixed resource types in kustomize output
    echo "▶ Applying base configuration..."
    kubectl apply -k config/overlays/development -n ${{ env.TEST_NAMESPACE }}
    
    # ✅ FIX 2: Override image to use local build (not registry)
    echo "▶ Setting local image..."
    kubectl set image deployment/dev-green-agent \
      ray-head=${{ env.LOCAL_IMAGE }} \
      ray-worker=${{ env.LOCAL_IMAGE }} \
      -n ${{ env.TEST_NAMESPACE }}
    
    # ✅ FIX 3: Wait for rollout (not individual pods)
    echo "▶ Waiting for deployment rollout..."
    kubectl rollout status deployment/dev-green-agent -n ${{ env.TEST_NAMESPACE }} --timeout=300s
    
    echo "✅ Deployment complete"
    kubectl get pods -n ${{ env.TEST_NAMESPACE }} -o wide
  shell: bash
