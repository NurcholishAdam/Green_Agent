name: Kubernetes Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TEST_NAMESPACE: green-agent-test
  KIND_VERSION: 'v0.20.0'
  KUBERAY_CHART_VERSION: '1.1.0'  # ✅ Correct Helm chart version
  RAY_VERSION: '2.7.0'            # Ray version (for rayVersion field)
  LOCAL_IMAGE: green-agent:test

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.28.0'
    
    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.13.0'
    
    - name: Create Kind cluster
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind create cluster --name green-agent-test
        kubectl wait --for=condition=ready node --all --timeout=60s
      shell: bash
    
    # ✅ FIX: Use correct chart version + latest repo update
    - name: Install Ray Operator
      run: |
        echo "📦 Installing KubeRay Operator..."
        
        # Add repo
        helm repo add kuberay https://ray-project.github.io/kuberay-helm/
        
        # ✅ CRITICAL: Update repo to get latest chart versions
        helm repo update
        
        # ✅ Use correct chart version (1.1.0, not 2.7.0)
        helm install kuberay-operator kuberay/kuberay-operator \
          --version ${{ env.KUBERAY_CHART_VERSION }} \
          --namespace ray-system \
          --create-namespace \
          --wait --timeout 5m
        
        # Wait for CRDs
        kubectl wait --for=condition=established crd/rayclusters.ray.io --timeout=60s
        
        # Wait for operator pod
        kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=kuberay-operator \
          -n ray-system \
          --timeout=120s
        
        echo "✅ Ray Operator ready"
        kubectl get crd | grep ray
        kubectl get pods -n ray-system
      shell: bash
    
    - name: Build and load image
      run: |
        docker build -t ${{ env.LOCAL_IMAGE }} .
        kind load docker-image ${{ env.LOCAL_IMAGE }} --name green-agent-test
      shell: bash
    
    - name: Deploy Green Agent
      run: |
        kubectl create namespace ${{ env.TEST_NAMESPACE }}
        kubectl apply -k config/overlays/development -n ${{ env.TEST_NAMESPACE }}
        kubectl set image deployment/dev-green-agent \
          ray-head=${{ env.LOCAL_IMAGE }} \
          ray-worker=${{ env.LOCAL_IMAGE }} \
          -n ${{ env.TEST_NAMESPACE }}
      shell: bash
    
    - name: Wait for pods
      run: |
        kubectl wait --for=condition=ready pod \
          -l app=green-agent \
          -n ${{ env.TEST_NAMESPACE }} \
          --timeout=300s
        kubectl get pods -n ${{ env.TEST_NAMESPACE }}
      shell: bash
    
    - name: Run tests
      run: |
        pip install -r tests/requirements-tests.txt
        pytest tests/k8s/ -v --junitxml=k8s-test-results.xml
      shell: bash
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: k8s-test-results
        path: k8s-test-results.xml
    
    - name: Cleanup
      if: always()
      run: kind delete cluster --name green-agent-test || true
      shell: bash
