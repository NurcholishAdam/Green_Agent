name: Kubernetes Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TEST_NAMESPACE: green-agent-test
  MINIKUBE_VERSION: 'v1.32.0'
  KUBERNETES_VERSION: 'v1.28.0'

jobs:
  k8s-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Kubernetes
      uses: Azure/setup-kubectl@v4
      with:
        version: ${{ env.KUBERNETES_VERSION }}
    
    - name: Start Minikube
      uses: manusa/actions-setup-minikube@v2.10.0
      with:
        minikube version: ${{ env.MINIKUBE_VERSION }}
        kubernetes version: ${{ env.KUBERNETES_VERSION }}
        driver: docker
        start args: '--memory=4096 --cpus=2'
    
    - name: Install Helm
      uses: Azure/setup-helm@v4
      with:
        version: 'v3.13.0'
    
    - name: Deploy Prometheus Stack
      run: |
        kubectl create namespace monitoring
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm install prometheus prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --wait \
          --timeout 5m
    
    - name: Deploy Green Agent
      run: |
        kubectl create namespace ${{ env.TEST_NAMESPACE }}
        kubectl apply -k config/overlays/development -n ${{ env.TEST_NAMESPACE }}
    
    - name: Wait for Deployment
      run: |
        kubectl wait --for=condition=available \
          deployment/dev-green-agent-cluster-head \
          -n ${{ env.TEST_NAMESPACE }} \
          --timeout=300s
    
    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-tests.txt
    
    - name: Run K8s Integration Tests
      run: |
        pytest tests/k8s/ -v \
          --asyncio-mode=auto \
          --junitxml=k8s-test-results.xml \
          --cov=tests/k8s \
          --cov-report=xml \
          --cov-report=html
    
    - name: Run E2E Tests
      run: |
        pytest tests/e2e/ -v \
          -m e2e \
          --junitxml=e2e-test-results.xml \
          --cov=tests/e2e \
          --cov-report=xml
    
    # ✅ FIXED: Updated to v4
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: k8s-test-results
        path: |
          k8s-test-results.xml
          e2e-test-results.xml
          htmlcov/
        retention-days: 7
        compression-level: 6
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: k8s-tests
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Cleanup
      if: always()
      run: |
        kubectl delete namespace ${{ env.TEST_NAMESPACE }} || true
        helm uninstall prometheus -n monitoring || true
        minikube delete
