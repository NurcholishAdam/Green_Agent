apiVersion: v1
kind: Service
metadata:
  name: green-agent
  namespace: green-agent
  labels:
    app: green-agent
spec:
  type: ClusterIP
  selector:
    app: green-agent
    component: core
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: ray-dashboard
    port: 8265
    targetPort: 8265
    protocol: TCP
